<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Birthdays 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/🎂">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .foto-perfil {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid;
            transition: all 0.3s ease;
        }
        .card a {
            display: block  !important;
            min-height: 50px !important;
            width: 100% !important;
            position: relative !important;
            z-index: 50 !important;
        }
    </style>
</head>
<body class="p-8">
    <header class="text-center mb-12">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            Próximos Cumpleaños 🎈
        </h1>
        <p class="text-gray-400 mt-2">Fechas de Cumpleaños</p>
    </header>

    <div id="cumple-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <script>
        async function cargarCumples() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('cumple-container');
                const hoy = new Date();

                container.innerHTML = ''; 

                data.forEach(persona => {
                    const [mes, dia] = persona.fecha.split('-');
                    let proximo = new Date(hoy.getFullYear(), mes - 1, dia);
                    
                    if (proximo < hoy && hoy.toDateString() !== proximo.toDateString()) {
                        proximo.setFullYear(hoy.getFullYear() + 1);
                    }

                    const diff = Math.ceil((proximo - hoy) / (1000 * 60 * 60 * 24));
                    const esHoy = diff === 0 || (diff === -0);

                    container.innerHTML += `
                        <div class="card p-8 rounded-3xl transform transition hover:scale-105 flex flex-col items-center text-center">
                            
                            <div class="mb-4">
                                <img src="${persona.foto}" 
                                     alt="${persona.nombre}" 
                                     class="foto-perfil mx-auto"
                                     style="border-color: ${persona.color}"
                                     onerror="this.src='https://ui-avatars.com/api/?name=${persona.nombre}&background=random'">
                                <h2 class="text-3xl font-black mt-3 tracking-tight">${persona.nombre}</h2>
                            </div>

                            <p class="text-gray-400 text-sm italic mb-6">✨ ${persona.frase}</p>

                            <div class="flex flex-col items-center justify-center bg-white/5 w-full py-4 rounded-2xl">
                                <span class="text-7xl font-black ${esHoy ? 'text-yellow-400 animate-bounce' : 'text-white'}">
                                    ${esHoy ? '¡HOY!' : diff}
                                </span>
                                <span class="text-gray-500 font-bold text-sm uppercase tracking-widest mt-1">
                                    ${esHoy ? 'ES EL DÍA' : 'días faltantes'}
                                </span>
                            </div>

                            <div class="mt-4 opacity-30 text-2xl">
                                ${esHoy ? '🎂' : '🎁'}
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error cargando el JSON:", error);
            }
        }
        cargarCumples();
    </script>
</body>
</html>
