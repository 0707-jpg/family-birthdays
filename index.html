<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Birthdays 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/🎂">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .foto-perfil {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="p-8">
    <header class="text-center mb-12">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            Próximos Cumpleaños 🎈
        </h1>
        <p class="text-gray-400 mt-2">Sincronizado con la base de datos de Oscar</p>
    </header>

    <div id="cumple-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <script>
        async function cargarCumples() {
            try {
                // Forzamos la actualización para evitar el caché de GitHub
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('cumple-container');
                const hoy = new Date();

                container.innerHTML = ''; 

                data.forEach(persona => {
                    const [mes, dia] = persona.fecha.split('-');
                    let proximo = new Date(hoy.getFullYear(), mes - 1, dia);
                    
                    if (proximo < hoy && hoy.toDateString() !== proximo.toDateString()) {
                        proximo.setFullYear(hoy.getFullYear() + 1);
                    }

                    const diff = Math.ceil((proximo - hoy) / (1000 * 60 * 60 * 24));
                    const esHoy = diff === 0 || (diff === -0);

                    container.innerHTML += `
                        <div class="card p-6 rounded-2xl transform transition hover:scale-105">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-4">
                                    <img src="${persona.foto}" 
                                         alt="${persona.nombre}" 
                                         class="foto-perfil"
                                         style="border-color: ${persona.color}"
                                         onerror="this.src='https://ui-avatars.com/api/?name=${persona.nombre}&background=random'">
                                    
                                    <div>
                                        <h2 class="text-2xl font-bold">${persona.nombre}</h2>
                                        <span class="text-xs text-gray-400 tracking-widest uppercase">Integrante</span>
                                    </div>
                                </div>
                                <span class="text-3xl">${esHoy ? '🎂' : '🎁'}</span>
                            </div>

                            <p class="mt-4 text-gray-300 italic text-sm">"Le gusta: ${persona.interes}"</p>

                            <div class="mt-6 flex items-baseline">
                                <span class="text-5xl font-black ${esHoy ? 'text-yellow-400 animate-bounce' : 'text-white'}">
                                    ${esHoy ? '¡HOY!' : diff}
                                </span>
                                <span class="text-gray-400 ml-2 text-sm">${esHoy ? '' : 'días faltantes'}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error cargando el JSON:", error);
            }
        }
        cargarCumples();
    </script>
</body>
</html>
